<svg width="480" height="480" viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>ShadowDeploy logo</title>
  <desc>Production traffic flows through; a sampled slice mirrors to a shadow path that is diffed and never served.</desc>

  <rect x="0" y="0" width="480" height="480" rx="64" fill="#0F1B2D"/>
  <rect x="20" y="20" width="440" height="440" rx="48" fill="none" stroke="#1E3A5F" stroke-width="2"/>

  <!-- production lane (solid) -->
  <rect x="70" y="150" width="120" height="60" rx="12" fill="#2563EB"/>
  <text x="130" y="186" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500" fill="#FFFFFF" text-anchor="middle">prod</text>

  <!-- client (right) -->
  <rect x="300" y="150" width="120" height="60" rx="12" fill="#1E3A5F"/>
  <text x="360" y="186" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500" fill="#CBD5E1" text-anchor="middle">client</text>

  <!-- prod path to client (solid, served) -->
  <line x1="190" y1="180" x2="300" y2="180" stroke="#2563EB" stroke-width="5" stroke-linecap="round"/>
  <path d="M288 173 L300 180 L288 187" fill="none" stroke="#2563EB" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- shadow lane (mirrored slice, dashed, never returned) -->
  <rect x="180" y="300" width="140" height="60" rx="12" fill="none" stroke="#38BDF8" stroke-width="3" stroke-dasharray="2 0"/>
  <text x="250" y="336" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500" fill="#38BDF8" text-anchor="middle">shadow</text>

  <!-- sampled mirror tap (dashed down) -->
  <line x1="130" y1="210" x2="130" y2="330" stroke="#38BDF8" stroke-width="3" stroke-dasharray="8 7" stroke-linecap="round"/>
  <line x1="130" y1="330" x2="180" y2="330" stroke="#38BDF8" stroke-width="3" stroke-dasharray="8 7" stroke-linecap="round"/>
  <path d="M168 323 L180 330 L168 337" fill="none" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="100" y="278" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#38BDF8" text-anchor="middle">5%</text>

  <!-- diff node (where shadow output is compared, then discarded) -->
  <circle cx="380" cy="330" r="34" fill="none" stroke="#F59E0B" stroke-width="3"/>
  <text x="380" y="338" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="500" fill="#F59E0B" text-anchor="middle">&#8800;</text>
  <line x1="320" y1="330" x2="346" y2="330" stroke="#38BDF8" stroke-width="3" stroke-dasharray="8 7" stroke-linecap="round"/>
  <path d="M334 323 L346 330 L334 337" fill="none" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "never served" mark: shadow does NOT go to client (blocked) -->
  <line x1="380" y1="296" x2="380" y2="240" stroke="#64748B" stroke-width="3" stroke-dasharray="4 6" stroke-linecap="round"/>
  <line x1="368" y1="262" x2="392" y2="250" stroke="#EF4444" stroke-width="4" stroke-linecap="round"/>

  <!-- wordmark -->
  <text x="240" y="420" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="600" fill="#FFFFFF" text-anchor="middle">ShadowDeploy</text>
</svg>
